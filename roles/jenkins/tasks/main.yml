---
- name: Installer Java (requis Jenkins)
  apt:
    name: openjdk-17-jdk
    state: present

- name: Installer Jenkins via Snap (Ubuntu 24.04 recommandé)
  snap:
    name: jenkins
    classic: true

- name: S'assurer que Jenkins est démarré
  service:
    name: snap.jenkins.jenkins
    state: started
    enabled: yes

